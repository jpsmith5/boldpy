pipeline_name: boldpy
input_schema: boldpy_pep_schema.yaml
output_schema: boldpy_pipestat_schema.yaml

project_interface:
  command_template: >
    python {looper.piface_dir}/boldpy_collate.py
    --pep {looper.pep_config}
    --output-dir {looper.output_dir}

sample_interface:
  command_template: >
    python {looper.piface_dir}/boldpy_pipeline.py
    --sample-name {sample.sample_name}
    --data-format {sample.data_format}
    --scan-dir {sample.scan_dir}
    --prepared-dir {sample.prepared_dir_sample}
    --mlco-dir {sample.mlco_dir_sample}
    --results-dir {sample.results_dir}
    --n-layers {sample.n_layers}
    {sample.no_perfusion_flag}
    --pipestat-config {pipestat.config_file}
